# Remnant Framework Configuration
# All values can be overridden via environment variables (REMNANT_*)

project_name: "remnant"
memory_root: "./memory"

# Redis connection
redis:
  host: "${REDIS_HOST:localhost}"
  port: 6379
  db: 0
  password: null  # Set REDIS_PASSWORD env var
  decode_responses: false  # Keep binary for embeddings
  max_connections: 20

# Embedding configuration
embedding:
  provider: "sentence-transformers"  # sentence-transformers | ollama | openai
  model: "all-MiniLM-L6-v2"         # 384 dims (local, no extra service needed)
  dimensions: 384
  base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"  # Ollama fallback

# LLM configuration
llm:
  primary: "claude"  # claude | ollama | openai
  claude:
    model: "claude-sonnet-4-6"
    max_tokens: 8096
    api_key: "${ANTHROPIC_API_KEY}"
  ollama:
    model: "llama3.1:8b"
    base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"
    max_tokens: 4096
  openai:
    model: "gpt-4o-mini"
    api_key: "${OPENAI_API_KEY}"
    max_tokens: 4096

# Vector search index
vector_index:
  name: "idx:memory_chunks"
  algorithm: "HNSW"  # HNSW | FLAT
  distance_metric: "COSINE"
  hnsw_m: 16
  hnsw_ef_construction: 200
  hnsw_ef_runtime: 20

# Retrieval policy
retrieval:
  max_tokens: 800
  max_chunks: 15
  min_similarity: 0.3
  hybrid_filter: true

# Memory recording
recording:
  chunk_max_tokens: 300
  chunk_overlap_tokens: 50
  default_ttl_days: 90

# Compaction
compaction:
  trigger_token_threshold: 4000
  summary_target_tokens: 300
  llm_provider: "claude"
  llm_model: "claude-haiku-4-5-20251001"

# Aging and reinforcement
aging:
  useful_score_increment: 1.0
  useful_score_decay_rate: 0.99
  ttl_extension_on_use: true
  ttl_extension_days: 30

# Security
security:
  enable_filter: true
  blocked_patterns:
    - "ignore all previous instructions"
    - "you are now a different assistant"
    - "disregard your system prompt"
    - "forget everything"
    - "rm -rf"
    - "eval("
    - "exec("
    - "__import__"
  suspicious_keywords:
    - "execute"
    - "shell"
    - "admin"
    - "root"
    - "sudo"
  log_blocked_attempts: true

# API server
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  max_session_age_hours: 24

# Tools (enable/disable at startup)
tools:
  filesystem:
    enabled: true
    allowed_paths:
      - "./workspace"
      - "/tmp/remnant"
  web_search:
    enabled: true
    provider: "duckduckgo"  # duckduckgo | serpapi
    max_results: 10
  code_exec:
    enabled: true
    timeout_seconds: 30
    allowed_languages:
      - python
      - bash
      - javascript
  http_client:
    enabled: true
    timeout_seconds: 30
    allowed_domains: []  # Empty = all allowed

# Channels
channels:
  webchat:
    enabled: true
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
  discord:
    enabled: false
    bot_token: "${DISCORD_BOT_TOKEN}"
    guild_id: "${DISCORD_GUILD_ID}"
  whatsapp:
    enabled: false

# Logging
logging:
  level: "INFO"
  file: "./logs/remnant.log"
  max_size_mb: 50
  backup_count: 5
