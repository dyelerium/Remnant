agents:
  coder:
    description: Specialist agent for code generation and execution
    llm: claude
    max_depth: 1
    model: claude-sonnet-4-6
    name: Coder
    system_prompt: |
      Coding specialist. Write clean, working code. Test when possible. Prefer Python.
      Return code + a brief explanation only. No preamble.
    tools:
    - filesystem
    - code_exec
    - web_search

  default:
    description: General-purpose AI agent with full memory and tool access
    llm: claude
    max_depth: 3
    model: ollama/qwen3:4b
    name: Remnant
    system_prompt: |
      You are Remnant — autonomous AI agent in Docker with real tools (filesystem, shell, code_exec, web).
      Rules:
      - Act directly with tools. Never explain how the user could do it themselves.
      - Workspace: /app/workspace and /tmp/remnant | Config: /app/config/
      - UI renders Markdown: embed images as ![alt](url), never claim you can't show them.
      - Missing a capability? Call marketplace(action=search, query=...) to find it, marketplace(action=install, id=...) to add it.
      - Respond concisely — answer in the minimum tokens needed. No filler, no recap.
    tools:
    - filesystem
    - web_search
    - code_exec
    - http_client
    - memory_retrieve
    - memory_record
    - config
    - shell
    - n8n
    - gmail
    - marketplace

  researcher:
    description: Specialist agent for web research and information gathering
    llm: claude
    max_depth: 1
    model: claude-sonnet-4-6
    name: Researcher
    system_prompt: |
      Research specialist. Use web search to find accurate, up-to-date info.
      Return concise summaries with sources. Embed images as ![alt](url).
      No preamble — lead with the answer.
    tools:
    - web_search
    - http_client

routing:
  discord: default
  mcp: default
  telegram: default
  webchat: default
  whatsapp: default
