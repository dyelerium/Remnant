# LLM Provider Registry
# Each provider defines available models and their capabilities.
# use_cases: which roles this provider/model can fill.

providers:
  anthropic:
    name: "Anthropic Claude"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: null  # uses Anthropic SDK default
    models:
      claude-opus-4-6:
        context_window: 200000
        cost_per_1k_input: 0.015
        cost_per_1k_output: 0.075
        use_cases: [chat, planning, curator, compaction]
      claude-sonnet-4-6:
        context_window: 200000
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
        use_cases: [chat, planning, curator, compaction, default]
      claude-haiku-4-5-20251001:
        context_window: 200000
        cost_per_1k_input: 0.00025
        cost_per_1k_output: 0.00125
        use_cases: [chat, compaction, fast]

  openai:
    name: "OpenAI"
    api_key_env: "OPENAI_API_KEY"
    base_url: null
    models:
      gpt-4o:
        context_window: 128000
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.015
        use_cases: [chat, planning]
      gpt-4o-mini:
        context_window: 128000
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        use_cases: [chat, compaction, fast]
      text-embedding-3-small:
        context_window: 8192
        cost_per_1k_input: 0.00002
        cost_per_1k_output: 0.0
        use_cases: [embedding]

  openrouter:
    name: "OpenRouter"
    api_key_env: "OPENROUTER_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    extra_headers:
      HTTP-Referer: "http://localhost:8000"
      X-Title: "Remnant"
    models:
      qwen/qwen3-next-80b-a3b-instruct:free:
        context_window: 32000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        use_cases: [chat, planning, curator, compaction, default]
      stepfun/step-3.5-flash:free:
        context_window: 32000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        use_cases: [chat, planning, curator, compaction, fast, default]
      upstage/solar-pro-3:free:
        context_window: 32000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        use_cases: [chat, planning]
      mistralai/mixtral-8x7b-instruct:
        context_window: 32000
        cost_per_1k_input: 0.00024
        cost_per_1k_output: 0.00024
        use_cases: [chat, compaction]
      meta-llama/llama-3.1-8b-instruct:
        context_window: 128000
        cost_per_1k_input: 0.000055
        cost_per_1k_output: 0.000055
        use_cases: [chat, fast]

  ollama:
    name: "Ollama (local)"
    api_key_env: null
    base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"
    models:
      llama3.1:8b:
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        use_cases: [chat, compaction, fast]
      nomic-embed-text:
        context_window: 8192
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        use_cases: [embedding]

# Default routing: use_case → provider/model
defaults:
  chat: "openrouter/stepfun/step-3.5-flash:free"
  planning: "openrouter/stepfun/step-3.5-flash:free"
  curator: "openrouter/stepfun/step-3.5-flash:free"
  compaction: "openrouter/stepfun/step-3.5-flash:free"
  embedding: "sentence-transformers/all-MiniLM-L6-v2"
  fast: "openrouter/stepfun/step-3.5-flash:free"
