    examples:
      - description: Send a message
        args:
          url: "https://discord.com/api/webhooks/YOUR/WEBHOOK"
          method: POST
          body:
            content: "Hello from Remnant!"

- id: telegram_send
  type: skill
  title: Telegram Message Sender
  description: Send messages via Telegram Bot API (needs TELEGRAM_BOT_TOKEN and CHAT_ID).
  tags: [messaging, telegram, notifications]
  status: available
  requires: [TELEGRAM_BOT_TOKEN]
  skill_yaml: |
    name: telegram_send
    description: >
      Send a Telegram message via Bot API.
      Call with: url=https://api.telegram.org/botTOKEN/sendMessage, method=POST, body={"chat_id":CHAT_ID,"text":"message"}
    tool: http_client
    tags: [telegram, messaging]
    safety_level: safe
    requires: [TELEGRAM_BOT_TOKEN]
    examples:
      - description: Send a message
        args:
          url: "https://api.telegram.org/bot<TOKEN>/sendMessage"
          method: POST
          body:
            chat_id: 123456789
            text: "Hello from Remnant!"

