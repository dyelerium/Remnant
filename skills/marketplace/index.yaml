# ── MCP Servers ─────────────────────────────────────────────────────

- id: mcp_github
  type: mcp
  title: GitHub MCP Server
  description: Full GitHub API via MCP — repos, PRs, issues, commits, code search.
  tags: [github, mcp, code, version-control]
  status: available
  requires: [GITHUB_PERSONAL_ACCESS_TOKEN]
  install_instructions: |
    Add to Claude Code MCP config (~/.claude/claude_desktop_config.json):
    {
      "mcpServers": {
        "github": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-github"],
          "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "YOUR_TOKEN" }
        }
      }
    }

- id: mcp_filesystem
  type: mcp
  title: Filesystem MCP Server
  description: Local filesystem access via MCP — read, write, list files.
  tags: [filesystem, mcp, files]
  status: available
  requires: []
  install_instructions: |
    Add to Claude Code MCP config:
    {
      "mcpServers": {
        "filesystem": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/allow"]
        }
      }
    }

- id: mcp_postgres
  type: mcp
  title: PostgreSQL MCP Server
  description: Query PostgreSQL databases via MCP.
  tags: [database, postgres, sql, mcp]
  status: available
  requires: [POSTGRES_CONNECTION_STRING]
  install_instructions: |
    Add to Claude Code MCP config:
    {
      "mcpServers": {
        "postgres": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-postgres", "POSTGRES_CONNECTION_STRING"]
        }
      }
    }

- id: mcp_brave_search
  type: mcp
  title: Brave Search MCP Server
  description: High-quality web search via Brave Search API through MCP.
  tags: [search, web, mcp, brave]
  status: available
  requires: [BRAVE_API_KEY]
  install_instructions: |
    Add to Claude Code MCP config:
    {
      "mcpServers": {
        "brave-search": {
          "command": "npx",
          "args": ["-y", "@modelcontextprotocol/server-brave-search"],
          "env": { "BRAVE_API_KEY": "YOUR_KEY" }
        }
      }
    }
    Get a free API key at brave.com/search/api/
