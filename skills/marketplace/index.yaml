# ── Webhook / messaging skills ──────────────────────────────────────

- id: slack_notify
  type: skill
  title: Slack Notification
  description: Send messages to Slack channels via Incoming Webhook (needs SLACK_WEBHOOK_URL).
  tags: [messaging, slack, notifications, webhook]
  status: available
  requires: [SLACK_WEBHOOK_URL]
  skill_yaml: |
    name: slack_notify
    description: >
      Send a Slack message via Incoming Webhook.
      Call with: url=WEBHOOK_URL, method=POST, body={"text":"your message"}
      Get webhook URL from api.slack.com/apps → Incoming Webhooks.
      Store it as a Remnant secret named SLACK_WEBHOOK_URL.
    tool: http_client
    tags: [slack, messaging, webhook]
    safety_level: safe
    requires: [SLACK_WEBHOOK_URL]
    examples:
      - description: Send a message
        args:
          url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
          method: POST
          body:
            text: "Hello from Remnant!"

- id: discord_notify
  type: skill
  title: Discord Notification
  description: Send messages to Discord channels via Webhook (needs DISCORD_WEBHOOK_URL).
  tags: [messaging, discord, notifications, webhook]
  status: available
  requires: [DISCORD_WEBHOOK_URL]
  skill_yaml: |
    name: discord_notify
    description: >
      Send a Discord message via Webhook.
      Call with: url=WEBHOOK_URL, method=POST, body={"content":"your message"}
    tool: http_client
    tags: [discord, messaging, webhook]
