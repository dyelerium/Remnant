# ── Free HTTP skills (no API key) ──────────────────────────────────

- id: weather_check
  type: skill
  title: Weather Check
  description: Get current weather + hourly forecast for any coordinates (Open-Meteo, free, no key).
  tags: [weather, location, free]
  status: available
  requires: []
  skill_yaml: |
    name: weather_check
    description: >
      Current weather + forecast via Open-Meteo (free, no API key).
      Call with: url=https://api.open-meteo.com/v1/forecast?latitude=LAT&longitude=LON&current_weather=true&hourly=temperature_2m,windspeed_10m
    tool: http_client
    tags: [weather, free]
    safety_level: safe
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: "Open-Meteo URL with latitude and longitude substituted, e.g. https://api.open-meteo.com/v1/forecast?latitude=46.77&longitude=23.59&current_weather=true"
      required: [url]
    examples:
      - description: Weather for Cluj-Napoca
        args:
          url: "https://api.open-meteo.com/v1/forecast?latitude=46.77&longitude=23.59&current_weather=true"

- id: ip_info
